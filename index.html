<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Generic Crafting Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Generic Crafting Calculator</h1>

    <!-- Add Recipe Card -->
    <div class="card" id="addRecipeCard">
      <h2>Add Recipe</h2>
      <label for="itemName">Item Name:</label>
      <input list="ingredientList" type="text" id="itemName" />

      <label for="produces">Produces (quantity):</label>
      <input type="number" id="produces" value="1" min="1" />

      <div id="byproducts">
        <h3>Byproducts <span class="optional-label">(optional)</span></h3>
        <!-- JS populates byproduct rows here -->
      </div>
      <button type="button" onclick="addByproductField()">+ Add Byproduct</button>

      <div id="ingredients">
        <h3>Ingredients</h3>
        <!-- JS will populate first ingredient field -->
      </div>

      <!-- shared datalist for all ingredient inputs -->
      <datalist id="ingredientList"></datalist>

      <button type="button" onclick="addIngredientField()">+ Add Ingredient</button>
      <button type="button" onclick="addRecipe()">Save Recipe</button>
    </div>

    <!-- Material Categories Card -->
    <div class="card" id="categoriesCard">
      <h2>Material Categories</h2>
      <label for="categoryName">Category Name:</label>
      <input type="text" id="categoryName" placeholder="e.g. refined_metal" />

      <div id="categoryMembers">
        <h3>Members</h3>
        <!-- JS populates member fields here -->
      </div>
      <button type="button" onclick="addCategoryMemberField()">+ Add Member</button>
      <button type="button" onclick="addCategory()">Save Category</button>

      <div id="storedCategories"></div>
    </div>

    <!-- Craft Item Card -->
    <div class="card" id="craftCard">
      <h2>Craft</h2>
      <label for="craftItem">Item:</label>
      <select id="craftItem" onchange="updateVariantSelector(); updateMaterialSelectors()">
        <option value="" disabled selected>Select an item</option>
      </select>

      <div id="variantSelector" style="display: none;">
        <label for="variantSelect">Recipe Variant:</label>
        <select id="variantSelect" onchange="saveVariantSelection()"></select>
      </div>

      <div id="materialSelectors" style="display: none;"></div>

      <label for="craftQty">Quantity:</label>
      <input type="number" id="craftQty" value="1" min="1" />
      <button type="button" onclick="addToQueue()">+ Add to Queue</button>
    </div>

    <!-- Queue Card -->
    <div class="card" id="queueCard">
      <h2>Queue</h2>
      <div id="queueItems">
        <p class="queue-empty">No items in queue.</p>
      </div>
      <div class="queue-actions">
        <button type="button" class="btn-secondary" onclick="clearQueue()">Clear Queue</button>
        <button type="button" id="calculateBtn" onclick="calculate()" disabled>Calculate All</button>
      </div>
    </div>

    <!-- Results Card -->
    <div class="card" id="resultsCard">
      <h2>Results</h2>
      <div id="results"></div>
    </div>

    <!-- Stored Recipes Card -->
    <div class="card" id="storedRecipesCard">
      <h2>Stored Recipes</h2>
      <label for="gameSelect">Load Recipe Pack:</label>
      <select id="gameSelect">
        <option value="">Custom Recipes Only</option>
        <option value="the-alters">The Alters</option>
      </select>
      <button type="button" onclick="loadGameRecipes()">Load Recipes</button>
      <div id="gameStatus"></div>
      <div id="storedRecipes"></div>
    </div>
    <script src="app.js" defer></script>
  </body>
</html>
